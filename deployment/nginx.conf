# MarketMascot — nginx reverse proxy config
# Deploy: sudo cp deployment/nginx.conf /etc/nginx/sites-enabled/marketmascot
#         sudo nginx -t && sudo systemctl reload nginx
#
# Replace "your-domain.com" with your actual domain (or VM public IP).
# Get free TLS cert: sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Flask app (browser ↔ nginx WebSocket upgrade handled here)
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # Required for Flask-SocketIO browser WebSocket connections
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep long-polling / WebSocket connections alive
        proxy_read_timeout 86400;
    }

    # Serve static files directly via nginx for better performance
    location /static/ {
        alias /home/ubuntu/marketmascot/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
