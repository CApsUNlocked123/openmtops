services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json
      - ./anon.session:/app/anon.session
      - ./data:/app/data
    environment:
      - TESTING=0
      - HOST=0.0.0.0

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
