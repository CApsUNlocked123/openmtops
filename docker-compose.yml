services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json
      - ./anon.session:/app/anon.session
      - ./data:/app/data
    environment:
      - TESTING=0
      - HOST=0.0.0.0

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env.nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./public:/etc/nginx/public:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    entrypoint: >
      /bin/sh -c "envsubst '$$PRIMARY_DOMAIN $$APP_SUBDOMAIN $$SECONDARY_DOMAIN'
      < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - app
