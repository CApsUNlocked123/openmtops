events { worker_connections 1024; }

http {
  # HTTP → HTTPS redirect (all domains)
  server {
    listen 80;
    server_name YOUR_PRIMARY_DOMAIN.com www.YOUR_PRIMARY_DOMAIN.com YOUR_SECONDARY_DOMAIN.com www.YOUR_SECONDARY_DOMAIN.com;
    return 301 https://YOUR_PRIMARY_DOMAIN.com$request_uri;
  }

  # YOUR_SECONDARY_DOMAIN.com → YOUR_PRIMARY_DOMAIN.com (HTTPS redirect)
  server {
    listen 443 ssl;
    server_name YOUR_SECONDARY_DOMAIN.com www.YOUR_SECONDARY_DOMAIN.com www.YOUR_PRIMARY_DOMAIN.com;
    ssl_certificate /etc/letsencrypt/live/YOUR_PRIMARY_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_PRIMARY_DOMAIN.com/privkey.pem;
    return 301 https://YOUR_PRIMARY_DOMAIN.com$request_uri;
  }

  # Primary app server
  server {
    listen 443 ssl;
    server_name YOUR_PRIMARY_DOMAIN.com;
    ssl_certificate /etc/letsencrypt/live/YOUR_PRIMARY_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_PRIMARY_DOMAIN.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://app:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }
  }
}
