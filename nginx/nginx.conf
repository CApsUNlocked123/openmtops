events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── HTTP → HTTPS (all domains) ───────────────────────────────────────────────
  server {
    listen 80;
    server_name $PRIMARY_DOMAIN www.$PRIMARY_DOMAIN $APP_SUBDOMAIN $SECONDARY_DOMAIN www.$SECONDARY_DOMAIN;
    return 301 https://$host$request_uri;
  }

  # ── Secondary domain + www.primary → primary ─────────────────────────────────
  server {
    listen 443 ssl;
    server_name $SECONDARY_DOMAIN www.$SECONDARY_DOMAIN www.$PRIMARY_DOMAIN;
    ssl_certificate     /etc/letsencrypt/live/$PRIMARY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$PRIMARY_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 301 https://$PRIMARY_DOMAIN$request_uri;
  }

  # ── Public website: primary domain ───────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name $PRIMARY_DOMAIN;
    ssl_certificate     /etc/letsencrypt/live/$PRIMARY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$PRIMARY_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root  /etc/nginx/public;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  # ── Trading app: app subdomain ────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name $APP_SUBDOMAIN;
    ssl_certificate     /etc/letsencrypt/live/$PRIMARY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$PRIMARY_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass         http://app:5000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }
  }
}
