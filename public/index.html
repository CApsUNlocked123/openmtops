<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketMascot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.75rem;
    }

    .logo span {
      color: #f97316;
    }

    .tagline {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 2rem;
      max-width: 420px;
    }

    .badge {
      display: inline-block;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      font-size: 0.8rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Market<span>Mascot</span></div>
    <p class="tagline">Smarter F&amp;O trading tools for Indian markets — built for retail, not institutions.</p>
    <span class="badge">Coming Soon</span>
  </div>
</body>
</html>
