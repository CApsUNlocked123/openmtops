<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Restarting…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; height:100vh; }
    .spinner-border { width:3rem; height:3rem; }
  </style>
</head>
<body>
  <div class="card text-center p-4" style="max-width:360px;width:100%;">
    <div class="card-body">
      <img src="/static/assets/darkSmall.png" alt="MarketMascot" style="height:44px;margin-bottom:20px;border-radius:10px;">
      <div class="spinner-border mb-4 d-block mx-auto" style="color:#9C27B0;" role="status"></div>
      <h4 class="fw-bold">Restarting app…</h4>
      <p class="text-secondary mb-1">New credentials saved. Page will reload automatically.</p>
      <p class="text-secondary small" id="countdown">Retrying in 4s…</p>
    </div>
  </div>
  <script>
    let secs = 4;
    const el = document.getElementById('countdown');
    const iv = setInterval(() => {
      secs--;
      el.textContent = secs > 0 ? `Retrying in ${secs}s…` : 'Connecting…';
      if (secs <= 0) {
        clearInterval(iv);
        // Keep retrying until the restarted server responds
        (function retry() {
          fetch('/').then(r => { if (r.ok) window.location.href = '/settings'; else setTimeout(retry, 1000); })
                    .catch(() => setTimeout(retry, 1000));
        })();
      }
    }, 1000);
  </script>
</body>
</html>
