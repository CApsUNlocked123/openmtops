<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Restarting…</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; height:100vh; background:#0d0d0d; }
    .spinner-border { width:3rem; height:3rem; }
  </style>
</head>
<body>
  <div class="text-center">
    <div class="spinner-border text-success mb-4" role="status"></div>
    <h4 class="fw-bold">Restarting app…</h4>
    <p class="text-secondary">New credentials saved. Page will reload automatically.</p>
    <p class="text-secondary small" id="countdown">Retrying in 4s…</p>
  </div>
  <script>
    let secs = 4;
    const el = document.getElementById('countdown');
    const iv = setInterval(() => {
      secs--;
      el.textContent = secs > 0 ? `Retrying in ${secs}s…` : 'Connecting…';
      if (secs <= 0) {
        clearInterval(iv);
        // Keep retrying until the restarted server responds
        (function retry() {
          fetch('/').then(r => { if (r.ok) window.location.href = '/settings'; else setTimeout(retry, 1000); })
                    .catch(() => setTimeout(retry, 1000));
        })();
      }
    }, 1000);
  </script>
</body>
</html>
